name: 🐛 Bug Report
description: Report a problem so we can fix it.
title: '[Bug]: '
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! The more detail you provide, the faster we
        can reproduce and fix the problem.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I have searched existing issues and this has not been reported yet.
          required: true
        - label: I am running a supported version of Node.js (20 or newer).
          required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `/team create ...`
        2. Run `/scrim propose ...`
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Bot (Discord commands)
        - Core (@scrimmage/core)
        - Storage (@scrimmage/storage-sqlite)
        - Documentation
        - Other / not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Which release or commit are you running?
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, Node.js version, deployment method, etc.
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output. This will be rendered as code.
      render: shell
