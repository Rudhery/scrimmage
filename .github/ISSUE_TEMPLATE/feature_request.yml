name: 💡 Feature Request
description: Suggest an idea or improvement for Scrimmage.
title: '[Feature]: '
labels: ['enhancement', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea! Please describe the problem you're trying to solve, not just the
        solution — it helps us find the best approach together.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I have searched existing issues and this has not been requested yet.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem would this feature solve? What are you unable to do today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've thought about.
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Bot (Discord commands)
        - Core (@scrimmage/core)
        - Storage (@scrimmage/storage-sqlite)
        - Documentation
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, mockups, or screenshots here.
