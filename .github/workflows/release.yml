name: Release

on:
  push:
    branches: [main]

# Required for the Changesets action to open the "Version Packages" PR and
# create GitHub releases.
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # When changesets are pending, this opens/updates a "Version Packages" PR
      # that bumps versions and updates changelogs. When none are pending, it is
      # a no-op. Publishing to npm is intentionally NOT enabled yet — to turn it
      # on once you have an `NPM_TOKEN` repository secret:
      #   1. Add `publish: npm run release` to the `with:` block below.
      #   2. Add `NPM_TOKEN: ${{ secrets.NPM_TOKEN }}` under `env:`.
      - name: Create release (version) PR
        uses: changesets/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
